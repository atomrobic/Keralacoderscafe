name: Bug report
description: Report a reproducible problem with the website or repository
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Please include enough detail for someone else to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the exact steps that lead to the issue
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Scroll to ...
        4. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened?
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Affected page or file
      description: Optional but helpful
      placeholder: /join/whatsapp or app/components/Hero.tsx
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI / Design
        - Content / Copy
        - Accessibility
        - Build / CI
        - Repository / Docs
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device, Node.js version, or any other relevant details
      placeholder: Chrome 135 on Windows 11, mobile Safari, Node 22.x, etc.
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or logs
      description: Paste screenshots, stack traces, or console output if relevant
